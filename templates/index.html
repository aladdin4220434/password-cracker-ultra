<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Password Cracker Ultra</title>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 { text-align: center; margin-bottom: 30px; }
        input, button {
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            width: 100%;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #48bb78;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #38a169; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row input { width: 50%; }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: #fbbf24; }
        .progress-bar {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: #48bb78;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }
        .logs {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
        }
        .log-entry { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .log-success { color: #48bb78; }
        .log-error { color: #f56565; }
        .log-info { color: #4299e1; }
        .button-group { display: flex; gap: 15px; }
        .btn-stop { background: #f56565; }
        .btn-stop:hover { background: #c53030; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Password Cracker Ultra</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="cpuUsage">-</div>
                <div>CPU Usage</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="ramUsage">-</div>
                <div>RAM Usage</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="speedValue">0</div>
                <div>🚀 Speed (req/s)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="checkedValue">0</div>
                <div>Checked</div>
            </div>
        </div>
        
        <input type="text" id="studentId" placeholder="رقم الطالب" value="4220434">
        
        <div class="form-row">
            <input type="number" id="startRange" placeholder="بداية" value="100000">
            <input type="number" id="endRange" placeholder="نهاية" value="109999">
        </div>
        
        <div class="button-group">
            <button id="startBtn">▶ بدء الهجوم</button>
            <button id="stopBtn" class="btn-stop" disabled>⏹ إيقاف</button>
        </div>
        
        <div class="progress-bar" style="margin: 20px 0;">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="logs" id="logs">
            <div class="log-entry log-info">✨ النظام جاهز. أدخل رقم الطالب وابدأ البحث.</div>
        </div>
    </div>
    
    <script>
        let interval = null;
        
        function addLog(msg, type='info') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }
        
        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('speedValue').innerText = data.speed || 0;
                document.getElementById('checkedValue').innerText = data.checked || 0;
                document.getElementById('progressFill').style.width = `${data.progress || 0}%`;
                
                if (data.found) {
                    addLog(`🎉 تم العثور على كلمة السر: ${data.found_password}`, 'success');
                    stopSearch();
                }
            } catch(e) {}
        }
        
        async function updateSystem() {
            try {
                const res = await fetch('/api/system');
                const data = await res.json();
                document.getElementById('cpuUsage').innerText = `${data.cpu.usage}%`;
                document.getElementById('ramUsage').innerText = `${(data.memory.used / 1e9).toFixed(1)}GB`;
            } catch(e) {}
        }
        
        async function startSearch() {
            const studentId = document.getElementById('studentId').value;
            const startRange = document.getElementById('startRange').value;
            const endRange = document.getElementById('endRange').value;
            
            if (!studentId) {
                addLog('❌ أدخل رقم الطالب', 'error');
                return;
            }
            
            addLog(`🚀 بدء الهجوم على رقم الطالب: ${studentId}`);
            
            const res = await fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    student_id: studentId,
                    start_range: parseInt(startRange),
                    end_range: parseInt(endRange)
                })
            });
            const data = await res.json();
            
            if (data.status === 'started') {
                addLog(`✅ بدأ الهجوم - الوضع: ${data.mode}`, 'success');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                if (interval) clearInterval(interval);
                interval = setInterval(updateStatus, 500);
            } else {
                addLog(`❌ ${data.error}`, 'error');
            }
        }
        
        async function stopSearch() {
            addLog('⏹ إيقاف الهجوم...', 'info');
            await fetch('/api/stop', {method: 'POST'});
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            if (interval) clearInterval(interval);
        }
        
        document.getElementById('startBtn').onclick = startSearch;
        document.getElementById('stopBtn').onclick = stopSearch;
        
        updateSystem();
        setInterval(updateSystem, 2000);
        addLog('✅ النظام جاهز!', 'success');
    </script>
</body>
</html>
